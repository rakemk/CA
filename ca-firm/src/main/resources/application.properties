server.port=${SERVER_PORT:8080}

app.frontend-origin=http://localhost:3000,http://localhost:5173,http://127.0.0.1:5173,http://[::1]:5173

app.otp.length=6
app.otp.expiration-minutes=5
app.otp.max-attempts=5

# Dev-only manual login bypass. Keep disabled unless explicitly needed locally.
app.auth.manual-enabled=false
app.auth.manual-identifier=

app.jwt.secret=change-me-to-a-long-random-secret-key-for-jwt-signing-2026
app.jwt.expiration-minutes=60

app.mail.enabled=false
app.mail.from=no-reply@ca-firm.local

# Configure these when enabling mail
spring.mail.host=
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Set to true only when Twilio credentials are configured.
app.whatsapp.enabled=false
app.whatsapp.account-sid=
app.whatsapp.auth-token=
app.whatsapp.from-number=
